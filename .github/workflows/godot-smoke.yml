name: Godot smoke tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  godot-smoke:
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: 4.6.2
      GODOT_STATUS: stable
      GODOT_BIN: ${{ github.workspace }}/.godot-bin/Godot_v4.6.2-stable_linux.x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Godot
        run: |
          set -euo pipefail
          mkdir -p .godot-bin
          curl -L --fail --retry 3 \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-${GODOT_STATUS}/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64.zip" \
            -o /tmp/godot.zip
          unzip -q /tmp/godot.zip -d .godot-bin
          chmod +x "$GODOT_BIN"
          "$GODOT_BIN" --version

      - name: Check project
        run: "$GODOT_BIN --headless --path . --check-only --quit"

      - name: Run smoke tests
        run: |
          set -euo pipefail
          "$GODOT_BIN" --headless --path . -s tests/action_executor_smoke.gd
          "$GODOT_BIN" --headless --path . -s tests/scene_action_executor_smoke.gd
          "$GODOT_BIN" --headless --path . -s tests/control_bridge_smoke.gd
          "$GODOT_BIN" --headless --path . -s tests/file_bridge_smoke.gd
