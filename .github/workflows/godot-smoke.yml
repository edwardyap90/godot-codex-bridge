name: Godot smoke tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  godot-smoke:
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: 4.6.2
      GODOT_STATUS: stable
      GODOT_BIN: ${{ github.workspace }}/.godot-bin/Godot_v4.6.2-stable_linux.x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Godot
        run: |
          set -euo pipefail
          mkdir -p .godot-bin
          curl -L --fail --retry 3 \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-${GODOT_STATUS}/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64.zip" \
            -o /tmp/godot.zip
          unzip -q /tmp/godot.zip -d .godot-bin
          chmod +x "$GODOT_BIN"
          "$GODOT_BIN" --version

      - name: Check project
        run: "$GODOT_BIN --headless --path . --check-only --quit"

      - name: Check shell helpers
        run: |
          set -euo pipefail
          bash -n tools/godot_bridge_send.sh
          bash -n tools/godot_bridge_bootstrap_project.sh
          bash -n tools/godot_bridge_guard.sh
          python3 -m json.tool docs/schema/commands.schema.json >/tmp/godot_bridge_commands_schema.json
          tools/godot_bridge_send.sh validate-json '{"command":"ping"}'
          tools/godot_bridge_send.sh doctor --queue
          tools/godot_bridge_send.sh last-response
          tools/godot_bridge_send.sh clean-queue

      - name: Run smoke tests
        run: |
          set -euo pipefail
          "$GODOT_BIN" --headless --path . -s tests/action_executor_smoke.gd
          "$GODOT_BIN" --headless --path . -s tests/scene_action_executor_smoke.gd
          "$GODOT_BIN" --headless --path . -s tests/control_bridge_smoke.gd
          "$GODOT_BIN" --headless --path . -s tests/file_bridge_smoke.gd
          "$GODOT_BIN" --headless --path . -s tests/status_dock_smoke.gd

      - name: Check bootstrap workflow
        run: |
          set -euo pipefail
          tmp_project="$(mktemp -d)"
          CODEX_GODOT_BIN="$GODOT_BIN" tools/godot_bridge_bootstrap_project.sh --no-open --no-wait "$tmp_project" "Bootstrap Smoke"
          test -f "$tmp_project/addons/godot_codex_bridge/plugin.cfg"
          test -x "$tmp_project/tools/godot_bridge_send.sh"
          test -x "$tmp_project/tools/godot_bridge_guard.sh"
          grep -q 'res://addons/godot_codex_bridge/plugin.cfg' "$tmp_project/project.godot"

      - name: Check demo project
        run: |
          set -euo pipefail
          CODEX_GODOT_BIN="$GODOT_BIN" tools/godot_bridge_bootstrap_project.sh --no-open --no-wait examples/flappy-sky-runner "Flappy Sky Runner"
          "$GODOT_BIN" --headless --path examples/flappy-sky-runner --check-only --quit
          "$GODOT_BIN" --headless --path examples/flappy-sky-runner -s tests/flappy_smoke.gd
          CODEX_GODOT_BIN="$GODOT_BIN" tools/godot_bridge_bootstrap_project.sh --no-open --no-wait examples/bridge-dungeon "Bridge Dungeon"
          "$GODOT_BIN" --headless --path examples/bridge-dungeon --check-only --quit
          "$GODOT_BIN" --headless --path examples/bridge-dungeon -s tests/bridge_dungeon_smoke.gd
